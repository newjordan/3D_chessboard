[build]
builder = "NIXPACKS"
buildCommand = "npx prisma generate && npm run build"

[deploy]
startCommand = "npm run start"
restartPolicy = "always"

[nixpacks]
# Ensure both Node and Python are available for executing agents
pkgs = ["nodejs", "python3"]

[nixpacks.phases.setup]
nixPkgs = ["nodejs", "python3"]
